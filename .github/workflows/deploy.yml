name: Update Dependencies and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-dependencies:
    runs-on: ubuntu-latest

    outputs:
      changes-made: ${{ steps.check-changes.outputs.changes-made }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.13.0"

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          cache: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --dangerously-allow-all-builds

      - name: Update Merlin dependencies
        run: |
          pnpm update \
            @eth-peach-lab/mermaid-merlin \
            @eth-peach-lab/merlin \
            --dangerously-allow-all-builds

      - name: Check for dependency changes
        id: check-changes
        run: |
          if git diff --quiet package.json pnpm-lock.yaml; then
            echo "changes-made=false" >> "$GITHUB_OUTPUT"
            echo "No dependency changes"
          else
            echo "changes-made=true" >> "$GITHUB_OUTPUT"
            echo "Dependency changes detected"
          fi

      - name: Commit and push changes
        if: steps.check-changes.outputs.changes-made == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          git add package.json pnpm-lock.yaml
          git commit -m "chore: update Merlin dependencies"
          git push

  deploy:
    needs: update-dependencies
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout latest main
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.13.0"

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          cache: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --dangerously-allow-all-builds

      - name: Build project
        run: pnpm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
